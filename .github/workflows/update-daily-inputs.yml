name: Update daily flake inputs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        input:
          - claude-code
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update ${{ matrix.input }}
        run: nix flake update ${{ matrix.input }} --flake ./nix

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet nix/flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update ${{ matrix.input }} flake input"
          title: "Update ${{ matrix.input }} flake input"
          branch: auto/update-${{ matrix.input }}
          delete-branch: true
