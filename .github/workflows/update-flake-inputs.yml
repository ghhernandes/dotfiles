name: Update all flake inputs

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update all inputs
        run: nix flake update --flake ./nix

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet nix/flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update all flake inputs"
          title: "Monthly: update all flake inputs"
          branch: auto/update-all-inputs
          body: "Automated monthly update of all flake inputs."
          delete-branch: true
