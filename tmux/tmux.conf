set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 0

unbind C-b

set-option -g prefix C-a
set-option -g focus-events on
set-window-option -g mode-keys vi
bind-key C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-style 'fg=#5eacd3'
set -g base-index 1
set -g status-left-length 50

bind-key -r f display-popup -E "tmux-session-manager"

bind w choose-tree -Zw -F "#{?session_format,,#{?window_format,#{?#{@icon},#{@icon} ,}#{window_name},#{pane_current_command}}}"

# Override per host by exporting TMUX_AGENT_BASE_DIR / TMUX_AGENT_CMD before tmux starts.
set -gF @agent-base-dir "#{?TMUX_AGENT_BASE_DIR,#{TMUX_AGENT_BASE_DIR},#{HOME}/dev}"
# Spawn a new session + agent (window) named after the prompts, then start the agent in it.
bind a command-prompt -p "session:,agent:" "run-shell -b 'tmux new-session -d -s \"%1\" -n \"%2\" -c \"#{@agent-base-dir}\" \"\${TMUX_AGENT_CMD:-claude}\" && tmux switch-client -t \"%1\"'"
# Add a new agent (window) to the CURRENT session.
bind A command-prompt -p "agent:" "run-shell -b 'tmux new-window -n \"%%\" -c \"#{@agent-base-dir}\" \"\${TMUX_AGENT_CMD:-claude}\"'"

# Claude Code integration: prepend @icon (set by hooks) to the window label.
set -g window-status-format         '#I:#{?#{@icon},#{@icon} ,}#W#F'
set -g window-status-current-format '#I:#{?#{@icon},#{@icon} ,}#W#F'
